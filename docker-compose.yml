services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
    networks:
      - code-collab-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      - BACKEND_HOST=backend
    depends_on:
      - backend
    networks:
      - code-collab-net

networks:
  code-collab-net:
    driver: bridge
